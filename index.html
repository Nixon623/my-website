<!DOCTYPE html>
<html>
<head>
<title>Dodoma Market Login</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#000,#0f2027,#203a43);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.card{
width:350px;
padding:40px;
background:#111;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
text-align:center;
animation:fade 1s;
}

h2{
color:gold;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:linear-gradient(45deg,gold,green);
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

a{
color:lightgreen;
}

@keyframes fade{
from{opacity:0;transform:translateY(-20px)}
to{opacity:1}
}

</style>

</head>

<body>

<div class="card">

<h2>Dodoma Market</h2>

<input placeholder="Email">
<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>No account? <a href="register.html">Register</a></p>

</div>


</body>
</html>
