<!DOCTYPE html>
<html>

<head>

<title>Post Product</title>

<style>

body{
font-family:Segoe UI;
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:400px;
background:#1a1a1a;
padding:30px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Upload Product</h2>

<input placeholder="Product Name">

<input placeholder="Seller Phone 1">

<input placeholder="Seller Phone 2">

<input placeholder="Price">

<textarea placeholder="Description"></textarea>

<input type="file">

<button onclick="post()">Post Product</button>

</div>



</body>

</html>
