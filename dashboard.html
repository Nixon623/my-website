<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<style>

body{
font-family:Segoe UI;
background:#0a0a0a;
color:white;
margin:0;
}

header{
background:black;
padding:20px;
color:gold;
font-size:22px;
text-align:center;
}

.menu{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.card{
width:200px;
padding:30px;
background:#111;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
background:#1a1a1a;
}

</style>

</head>

<body>

<header>Dodoma Universities Market</header>

<div class="menu">

<div class="card" onclick="location='products.html'">
<h3>Browse Products</h3>
</div>

<div class="card" onclick="location='post-product.html'">
<h3>Sell Product</h3>
</div>



</div>

</body>

</html>
