<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<style>

body{
font-family:Segoe UI;
background:black;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.card{
width:350px;
padding:40px;
background:#111;
border-radius:15px;
}

h2{
color:gold;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
background:green;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Create Account</h2>

<input placeholder="Full Name">
<input placeholder="University">
<input placeholder="Phone Number">
<input placeholder="Email">
<input type="password" placeholder="Password">

<button onclick="register()">Register</button>

</div>




</body>
</html>
